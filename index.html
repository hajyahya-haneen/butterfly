<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Flipbook</title>

  <style>
    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      height:100%;
      background:#f2f2f2;
      font-family: Arial, sans-serif;
    }

    body{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:10px;
      -webkit-tap-highlight-color: transparent;
      touch-action: pan-y;
    }

    /* حاوية الكتاب */
    #book-wrap{
      width:min(1200px, 98vw);
      height:min(78vh, 760px);
      min-height:320px;
      position:relative;
      background:transparent;
    }

    #book{
      width:100%;
      height:100%;
    }

    /* overlay للتحميل */
    .loading{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(242,242,242,.92);
      border-radius:12px;
      font-size:14px;
      color:#333;
      z-index:5;
      visibility:hidden;
    }
    .loading.show{ visibility:visible; }

    .btns{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    button{
      padding:10px 16px;
      border:0;
      border-radius:12px;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.12);
      background:#fff;
      font-size:14px;
    }

    .hint{
      font-size:13px;
      color:#333;
      text-align:center;
      opacity:.9;
      line-height:1.5;
      max-width: 1000px;
    }

    /* على الهاتف: نضمن أنه يشوف صفحتين بدون قص */
    @media (max-width: 900px){
      #book-wrap{
        width: 99vw;
        height: min(70vh, 520px);
        min-height: 280px;
      }
    }

    /* هاتف أفقي */
    @media (max-width: 900px) and (orientation: landscape){
      #book-wrap{
        width: 99vw;
        height: min(86vh, 620px);
      }
    }
  </style>
</head>

<body>

  <div id="book-wrap">
    <div class="loading" id="loading">جاري تحميل الصفحات…</div>
    <div id="book"></div>
  </div>

  <div class="btns">
    <button id="prev">السابق</button>
    <button id="next">التالي</button>
  </div>

  <div class="hint">
    ✅ ترتيب الصفحات: 2,4,6.. يمين — 3,5,7.. يسار. الغلاف 1 يظهر لوحده (يسار) + صفحة بيضاء، والغلاف 24 لوحده.
    <br>
    على الهاتف: اسحبي من طرف الصفحة أو انقري على طرفها للتقليب.
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <script>
    const TOTAL_PAGES = 24;

    // ✅ صوت تقليب خفيف (ممكن بعض الأجهزة تشغّله بعد أول لمسة فقط)
    const flipSound = new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQAAAAA=");
    flipSound.volume = 0.2;
    function playFlipSound(){
      try{
        flipSound.currentTime = 0;
        flipSound.play().catch(()=>{});
      }catch(e){}
    }

    // ✅ نبني ترتيب الصفحات حسب طلبك:
    // 1 لوحدها
    // الأزواج: (2,3)-> نعرض 3 ثم 2 ليصير 2 يمين و3 يسار
    // ...
    // 24 لوحدها
    const pages = [];
    pages.push("1.jpg");

    for(let i=2; i<=TOTAL_PAGES-2; i+=2){
      // (i = 2,4,6..22) و (i+1 = 3,5,7..23)
      pages.push(`${i+1}.jpg`); // يسار
      pages.push(`${i}.jpg`);   // يمين
    }

    pages.push("24.jpg");

    const bookEl = document.getElementById("book");
    const wrapEl = document.getElementById("book-wrap");
    const loadingEl = document.getElementById("loading");
    let pageFlip = null;

    const isMobile = () => window.matchMedia("(max-width: 900px)").matches;

    function showLoading(on){
      loadingEl.classList.toggle("show", !!on);
    }

    // ✅ تحسين التحميل: تحميل الصفحات على دفعات (chunk) لتجنب تجميد الهاتف
    async function preloadInChunks(urls, chunkSize = 4){
      showLoading(true);

      for(let i=0; i<urls.length; i+=chunkSize){
        const chunk = urls.slice(i, i+chunkSize);
        await Promise.all(chunk.map(src => new Promise(resolve=>{
          const img = new Image();
          img.onload = () => resolve(true);
          img.onerror = () => resolve(false);
          img.decoding = "async";
          img.loading = "eager";
          img.src = src;
        })));
        // نترك UI يتنفس (مهم على الموبايل)
        await new Promise(r => setTimeout(r, 30));
      }

      showLoading(false);
    }

    // ✅ حساب حجم الصفحة بحيث تظهر صفحتان كاملتان بدون قص
    function computePageSize(){
      const W = Math.max(320, wrapEl.clientWidth);
      const H = Math.max(280, wrapEl.clientHeight);

      // نريد صفحتين جنب بعض => 2*pageW <= W
      // ونريد ارتفاع كامل => pageH <= H
      // صورك مربعة غالبًا، لكن حتى لو ليست مربعة: الأفضل نخلي الصفحة "أقرب للمربع" لتجنب قص
      let page = Math.floor(Math.min(H, W/2));
      page = Math.max(240, page);

      return { pageW: page, pageH: page };
    }

    async function init(){
      showLoading(true);

      // استقرار القياس بعد دوران الشاشة
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

      // preload
      await preloadInChunks(pages, isMobile() ? 3 : 6);

      // destroy السابق إن وجد
      if(pageFlip){
        try{ pageFlip.destroy(); }catch(e){}
        pageFlip = null;
      }
      bookEl.innerHTML = "";

      const { pageW, pageH } = computePageSize();
      const mobile = isMobile();

      pageFlip = new St.PageFlip(bookEl, {
        width: pageW,
        height: pageH,

        // ✅ نثبت الحجم ليضمن عدم القص
        size: "fixed",

        // ✅ نريد صفحتين دائمًا حتى على الهاتف
        usePortrait: false,

        // ✅ الغلاف لوحده
        showCover: true,

        // ✅ تحسين اللمس
        mobileScrollSupport: true,
        useMouseEvents: true,
        swipeDistance: mobile ? 8 : 30,
        flippingTime: mobile ? 520 : 700,

        maxShadowOpacity: 0.35,
        disableFlipByClick: false
      });

      pageFlip.loadFromImages(pages);

      // ✅ صوت عند التقليب
      pageFlip.on("flip", () => playFlipSound());

      showLoading(false);
    }

    init();

    // أزرار
    document.getElementById("next").onclick = () => pageFlip && pageFlip.flipNext();
    document.getElementById("prev").onclick = () => pageFlip && pageFlip.flipPrev();

    // إعادة تهيئة آمنة عند تغيير الحجم/الدوران
    let t = null;
    function scheduleReinit(){
      clearTimeout(t);
      t = setTimeout(() => init(), 350);
    }
    window.addEventListener("resize", scheduleReinit);
    window.addEventListener("orientationchange", () => setTimeout(scheduleReinit, 250));
  </script>
</body>
</html>
