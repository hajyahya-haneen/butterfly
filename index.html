<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Flipbook</title>

  <style>
    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      height:100%;
      background:#f2f2f2;
      font-family: Arial, sans-serif;
      overflow:hidden;
    }

    body{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:10px;
      -webkit-tap-highlight-color: transparent;
    }

    #book-wrap{
      width: min(1200px, 99vw);
      height: min(82svh, 760px);
      min-height: 320px;
      position:relative;
      border-radius: 14px;
      overflow:hidden;
      background:#fff;
      box-shadow: 0 14px 45px rgba(0,0,0,.14);
    }

    #book{
      width:100%;
      height:100%;
    }

    .btns{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    button{
      padding:10px 16px;
      border:0;
      border-radius:12px;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.12);
      background:#fff;
      font-size:14px;
    }

    .hint{
      font-size:13px;
      color:#333;
      text-align:center;
      opacity:.9;
      line-height:1.5;
    }

    .loading{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.92);
      font-size:14px;
      color:#333;
      z-index:5;
    }
    .loading.hide{ display:none; }

    @media (max-width: 900px){
      #book-wrap{ width: 99vw; height: min(78svh, 720px); }
    }
    @media (max-width: 900px) and (orientation: landscape){
      #book-wrap{ width: 99vw; height: min(88svh, 900px); }
    }
  </style>
</head>

<body>

  <div id="book-wrap">
    <div class="loading" id="loading"><span id="loadingText">جاري تحميل الصفحات…</span></div>
    <div id="book"></div>
  </div>

  <div class="btns">
    <button id="prev">السابق</button>
    <button id="next">التالي</button>
  </div>

  <div class="hint">
    على الهاتف: اسحبي من طرف الصفحة للتقليب. (يفضّل الوضع الأفقي لعرض صفحتين كاملتين)
  </div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>

  <script>
    const TOTAL_PAGES = 24;

    // ✅ ترتيب مخصص:
    // 1 غلاف لوحده
    // ثم داخل كل زوج: (الفردي على اليسار) و(الزوجي على اليمين)
    // يعني: 3 يسار + 2 يمين ، 5 يسار + 4 يمين ... 23 يسار + 22 يمين
    // 24 غلاف لوحده
    const pages = [];
    pages.push("1.jpg");
    for (let i = 2; i <= TOTAL_PAGES - 2; i += 2) {
      pages.push(`${i + 1}.jpg`); // 3,5,7.. (يسار)
      pages.push(`${i}.jpg`);     // 2,4,6.. (يمين)
    }
    pages.push("24.jpg");

    const bookEl = document.getElementById("book");
    const wrapEl = document.getElementById("book-wrap");
    const loadingEl = document.getElementById("loading");
    const loadingText = document.getElementById("loadingText");

    let pageFlip = null;
    let currentIndex = 0;

    const isMobile = () => window.matchMedia("(max-width: 900px)").matches;

    function showLoading(msg){
      loadingText.textContent = msg || "جاري تحميل الصفحات…";
      loadingEl.classList.remove("hide");
    }
    function hideLoading(){
      loadingEl.classList.add("hide");
    }

    // نقرأ نسبة أول صورة (بعد الترتيب الجديد: أول صورة = 1.jpg)
    function getFirstImageRatio(src){
      return new Promise(resolve=>{
        const img = new Image();
        img.onload = () => {
          const w = img.naturalWidth || 1;
          const h = img.naturalHeight || 1;
          resolve(w / h);
        };
        img.onerror = () => resolve(1);
        img.src = src + "?v=" + Date.now();
      });
    }

    function computePageSize(pageRatio){
      const W = Math.max(320, wrapEl.clientWidth);
      const H = Math.max(320, wrapEl.clientHeight);

      let pageH_byH = H;
      let pageW_byH = pageH_byH * pageRatio;
      let bookW_byH = pageW_byH * 2;

      if (bookW_byH > W){
        const pageW = W / 2;
        const pageH = pageW / pageRatio;
        return { pageW: Math.floor(pageW), pageH: Math.floor(pageH) };
      }

      return { pageW: Math.floor(pageW_byH), pageH: Math.floor(pageH_byH) };
    }

    function preloadSome(urls, count, onProgress){
      const subset = urls.slice(0, count);
      let done = 0;

      return Promise.all(subset.map(src => new Promise(resolve=>{
        const img = new Image();
        img.onload = () => { done++; onProgress && onProgress(done, subset.length); resolve(true); };
        img.onerror = () => { done++; onProgress && onProgress(done, subset.length); resolve(false); };
        img.src = src;
      })));
    }

    function preloadRest(urls, startIndex){
      const rest = urls.slice(startIndex);
      rest.forEach(src=>{
        const img = new Image();
        img.src = src;
      });
    }

    async function initFlipbook(){
      showLoading("تحضير قياس الصفحات…");

      try { if (pageFlip) currentIndex = pageFlip.getCurrentPageIndex(); } catch(e){ currentIndex = 0; }

      await new Promise(r => requestAnimationFrame(()=>requestAnimationFrame(r)));

      const ratio = await getFirstImageRatio(pages[0]);

      const firstLoadCount = isMobile() ? 2 : 4;
      await preloadSome(pages, firstLoadCount, (d, tot)=>{
        showLoading(`تحميل سريع: ${d}/${tot}…`);
      });

      if (pageFlip){
        try{ pageFlip.destroy(); }catch(e){}
        pageFlip = null;
      }
      bookEl.innerHTML = "";

      const { pageW, pageH } = computePageSize(ratio);
      const mobile = isMobile();

      pageFlip = new St.PageFlip(bookEl, {
        width: pageW,
        height: pageH,

        size: "fixed",
        usePortrait: false,

        showCover: true,

        mobileScrollSupport: true,
        useMouseEvents: true,

        swipeDistance: mobile ? 8 : 25,
        flippingTime: mobile ? 520 : 700,
        maxShadowOpacity: 0.35,
        disableFlipByClick: false
      });

      pageFlip.loadFromImages(pages);

      try { pageFlip.flip(currentIndex); } catch(e){}

      hideLoading();

      setTimeout(()=>preloadRest(pages, firstLoadCount), 200);
    }

    initFlipbook();

    document.getElementById("next").onclick = () => pageFlip && pageFlip.flipNext();
    document.getElementById("prev").onclick = () => pageFlip && pageFlip.flipPrev();

    let t = null;
    function scheduleReinit(){
      clearTimeout(t);
      t = setTimeout(()=>initFlipbook(), 280);
    }
    window.addEventListener("resize", scheduleReinit);
    window.addEventListener("orientationchange", ()=> setTimeout(scheduleReinit, 200));
  </script>

</body>
</html>
