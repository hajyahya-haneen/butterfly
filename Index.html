<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Flipbook</title>

  <style>
    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      height:100dvh;
      background:#f2f2f2;
      font-family: Arial, sans-serif;
      overflow:hidden;
    }

    body{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:10px;
      -webkit-tap-highlight-color: transparent;
      touch-action: pan-y;
    }

    #book-wrap{
      width:min(1200px, 98vw);
      height:min(82dvh, 760px);
      min-height:300px;
      position:relative;
    }

    #book{
      width:100%;
      height:100%;
    }

    .btns{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    button{
      padding:10px 16px;
      border:0;
      border-radius:12px;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(0,0,0,.12);
      background:#fff;
      font-size:14px;
    }

    .hint{
      font-size:13px;
      color:#333;
      text-align:center;
      opacity:.9;
      line-height:1.5;
